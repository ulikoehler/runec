name: Build runec

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcap-dev

      - name: Build runec
        run: make

      - name: Rename binary
        run: mv runec runec_linux_amd64

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v5
        with:
          name: runec-linux-amd64
          path: runec_linux_amd64
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - target: amd64
            arch: x86_64
          - target: arm64
            arch: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcap-dev

      - name: Set up QEMU (for cross-compilation)
        if: matrix.target == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build runec (amd64)
        if: matrix.target == 'amd64'
        run: make

      - name: Build runec (arm64)
        if: matrix.target == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu libcap-dev:arm64
          make CC=aarch64-linux-gnu-gcc

      - name: Rename binary
        run: |
          if [ "${{ matrix.target }}" = "amd64" ]; then
            mv runec runec_linux_amd64
          else
            mv runec runec_linux_arm64
          fi

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v5
        with:
          name: runec-linux-${{ matrix.target }}
          path: runec_linux_${{ matrix.target }}
          retention-days: 30

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: runec_linux_${{ matrix.target }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
